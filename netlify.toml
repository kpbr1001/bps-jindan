# netlify.toml — 그로스벤처스 AI 사업계획서 진단 배포 설정 (v2.1)

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Node 런타임 명시 (함수 인식 안정화)
  node_version = "20"

# 프록시 호출용 리다이렉트
[[redirects]]
  from = "/api/diagnose"
  to = "/.netlify/functions/diagnose"
  status = 200
